{% extends "base.html" %} {% block title %}Edit Profile{% endblock %} {% block
content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-lg-8">
      <div class="card shadow-sm">
        <div class="card-header">
          <h1 class="h4 mb-0">Edit Profile</h1>
        </div>
        <div class="card-body">
          <form method="POST" action="{{ url_for('profile.edit_profile') }}">
            <div class="mb-3">
              <label for="username" class="form-label">Username</label>
              <input
                type="text"
                class="form-control"
                id="username"
                name="username"
                value="{{ user['username'] or '' }}"
              />
            </div>

            <div class="mb-3">
              <label for="email" class="form-label">Email</label>
              <input
                type="email"
                class="form-control"
                id="email"
                name="email"
                value="{{ user['email'] }}"
                required
              />
            </div>

            <div class="mb-3">
              <label for="major" class="form-label">Major</label>
              <input
                type="text"
                class="form-control"
                id="major"
                name="major"
                value="{{ user['major'] or '' }}"
              />
            </div>

            <div class="mb-3">
              <label for="role" class="form-label">Role</label>
              <input
                type="text"
                class="form-control"
                id="role"
                name="role"
                value="{{ user['role'] or '' }}"
              />
            </div>

            <div class="mb-4">
              <label for="group_size_pref" class="form-label"
                >Preferred Group Size</label
              >
              <input
                type="number"
                class="form-control"
                id="group_size_pref"
                name="group_size_pref"
                min="2"
                value="{{ user['group_size_pref'] }}"
                required
              />
            </div>

            <div class="d-flex gap-2">
              <button type="submit" class="btn btn-success">
                Save Changes
              </button>
              <a
                href="{{ url_for('profile.view_profile') }}"
                class="btn btn-secondary"
                >Cancel</a
              >
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
