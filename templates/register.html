{% extends "base.html" %} {% block title %}Register{% endblock %} {% block
content %}
<div class="row justify-content-center">
  <div class="col-md-6 col-lg-5">
    <div class="card shadow-sm">
      <div class="card-body p-4">
        <h2 class="text-center mb-4">Register</h2>

        <form method="POST" action="{{ url_for('auth.register_endpoint') }}">
          <!-- Email -->
          <div class="mb-3">
            <label class="form-label">Email</label>
            <input
              type="email"
              name="email"
              class="form-control"
              placeholder="Enter your email"
              required
            />
          </div>

          <!-- Password -->
          <div class="mb-3">
            <label class="form-label">Password</label>
            <input
              type="password"
              name="password"
              class="form-control"
              placeholder="Enter your password"
              required
            />
          </div>
          <div class="mb-3">
            <label class="form-label">Major</label>
            <input
              type="text"
              name="major"
              class="form-control"
              placeholder="Enter your major"
              required
            />
          </div>
          <div class="mb-3">
            <label class="form-label">Group Size Preference</label>
            <input
              type="text"
              name="groupSizePref"
              class="form-control"
              placeholder="Enter your group size preference"
              required
            />
          </div>

          <!-- Submit -->
          <div class="d-grid">
            <button type="submit" class="btn btn-primary">Register</button>
          </div>
        </form>

        <!-- Optional link -->
        <div class="text-center mt-3">
          <small>
            Already have an account?
            <a href="{{ url_for('auth.login_endpoint') }}">Login</a>
          </small>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
